<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<title>Document</title>
	<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We"
	crossorigin="anonymous">
</head>
<body class="bg-light">

	<div th:replace="navbar :: navbar"></div>


<div th:if="${success}" class="alert alert-success text-center">
    <span th:text="${success}"></span>
</div>

<div th:if="${error}" class="alert alert-danger text-center">
    <span th:text="${error}"></span>
</div>

	<div class="container p-3">
		<div class="card">
			<div class="card-body">
				<p class="text-center fs-1">All Student Details</p>
				<table class="table">
					<thead>
						<tr>
							<th scope="col">S.no</th>
							<th scope="col">Full Name</th>
							<th scope="col">DOB</th>
							<th scope="col">Address</th>
							<th scope="col">Qualification</th>
							<th scope="col">Email</th>
							<th scope="col">Action</th>
						</tr>						
					</thead>
					<tbody>
						
						<tr th:each="student,stat : ${students}">

							<th th:text="${stat.count}" scope="row"> </th>
							<td th:text="${student.fullName}"></td>
							<td th:text="${student.dob}"></td>
							<td th:text="${student.address}"></td>
							<td th:text="${student.qualification}"></td>
							<td th:text="${student.email}"></td>

							<td>
							<a th:href="@{/student/update/{id}(id=${student.id})}"
								class="btn btn-sm btn-primary">Edit</a> 
								
								<a th:href="@{/student/delete/{id}(id=${student.id})}"
								class="btn btn-sm btn-danger ms-1">Delete</a>
							</td>
						</tr>
						<tr th:if="${#lists.isEmpty(students)}">
                           <td colspan="6" class="text-center">No student found</td>
                       </tr>


					</tbody>
				</table>
			</div>
		</div>
	</div>


<script
		src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"
		integrity="sha384-eMNCOe7tC1doHpGoWe/6oMVemdAVTMs2xqW4mwXrXsW0L84Iytr2wi5v2QjrP/xp"
		crossorigin="anonymous">
</script>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.min.js"
		integrity="sha384-cn7l7gDp0eyniUwwAZgrzD06kc/tftFf19TOAs2zVinnD/C7E91j9yyk5//jjpt/"
		crossorigin="anonymous">
		</script>
</body>
</html>
