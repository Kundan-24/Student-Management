<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<title>Document</title>
	<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We"
	crossorigin="anonymous">
</head>
<body class="bg-light">

	<div th:replace="navbar :: navbar"></div>


	<div class="container p-4">
		<div class="row">
			<div class="col-md-6 offset-md-3">
				<div class="card-body">
					<p class="fs-3 text-center">Add student</p>
					
					<div th:if="${success}" class="alert alert-success text-center">
					   <span th:text="${success}"></span>
					</div>
				<form th:action="@{/students/add}" th:object="${student}" method="post">
					
						<div class="mb-3">
							<label class="form-label">Full Name</label> <input type="text"
							th:field="*{fullName}"	name="name" class="form-control">
						</div>

						<div class="mb-3">
							<label class="form-label">Date of Birth</label> <input
								type="date" th:field="*{dob}" name="dob" class="form-control">
						</div>

						<div class="mb-3">
							<label class="form-label">Address</label> <input type="text"
							th:field="*{address}"	name="address" class="form-control">
						</div>

						<div class="mb-3">
							<label class="form-label">Qualification</label> <input
								type="text" th:field="*{qualification}"  name="qualification" class="form-control">
						</div>

						<div class="mb-3">
							<label class="form-label">Email</label> <input type="email"
							th:field="*{email}"	name="email" class="form-control">
						</div>



						<button type="submit" class="btn btn-primary  col-md-12">Submit</button>
					</form>

				</div>
			</div>
		</div>
	</div>
	
	
	
	<script
		src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"
		integrity="sha384-eMNCOe7tC1doHpGoWe/6oMVemdAVTMs2xqW4mwXrXsW0L84Iytr2wi5v2QjrP/xp"
		crossorigin="anonymous">
</script>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.min.js"
		integrity="sha384-cn7l7gDp0eyniUwwAZgrzD06kc/tftFf19TOAs2zVinnD/C7E91j9yyk5//jjpt/"
		crossorigin="anonymous">
		</script>
		

</body>
</html>
